<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #eeede9;
      --text: #1a1a18;
      --text2: #6b6b66;
      --text3: #9c9a92;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --radius: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252523;
        --bg3: #2e2e2b;
        --text: #e8e6de;
        --text2: #9c9a92;
        --text3: #6b6b66;
        --border: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.18);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
    }

    .project-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text3);
      background: var(--bg3);
      border: 0.5px solid var(--border2);
      border-radius: 20px;
      padding: 3px 12px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 600;
      letter-spacing: -.02em;
      color: var(--text);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text2);
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 1.5rem 0 2rem;
      padding: 14px 18px;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .stat { font-size: 13px; color: var(--text2); }
    .stat strong { color: var(--text); font-weight: 500; }
    .stat-sep { color: var(--border2); user-select: none; }

    /* Filter bar */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 2rem;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 0.5px solid var(--border2);
      background: transparent;
      color: var(--text2);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--text3); color: var(--text); }

    .filter-btn.active[data-cat="all"]      { background: var(--bg3); border-color: var(--border2); color: var(--text); font-weight: 500; }
    .filter-btn.active[data-cat="entorno"]  { background: #E6F1FB; border-color: #185FA5; color: #185FA5; font-weight: 500; }
    .filter-btn.active[data-cat="vscode"]   { background: #EEEDFE; border-color: #534AB7; color: #534AB7; font-weight: 500; }
    .filter-btn.active[data-cat="gestion"]  { background: #EAF3DE; border-color: #3B6D11; color: #3B6D11; font-weight: 500; }
    .filter-btn.active[data-cat="ia"]       { background: #FAEEDA; border-color: #854F0B; color: #854F0B; font-weight: 500; }
    .filter-btn.active[data-cat="runtime"]  { background: #E1F5EE; border-color: #0F6E56; color: #0F6E56; font-weight: 500; }
    .filter-btn.active[data-cat="servidor"] { background: #FAECE7; border-color: #993C1D; color: #993C1D; font-weight: 500; }
    .filter-btn.active[data-cat="app"]      { background: #FBEAF0; border-color: #993556; color: #993556; font-weight: 500; }
    .filter-btn.active[data-cat="bbdd"]     { background: #F1EFE8; border-color: #5F5E5A; color: #5F5E5A; font-weight: 500; }
    .filter-btn.active[data-cat="infra"]    { background: #FCEBEB; border-color: #A32D2D; color: #A32D2D; font-weight: 500; }

    @media (prefers-color-scheme: dark) {
      .filter-btn.active[data-cat="entorno"]  { background: #0c3150; border-color: #378ADD; color: #85B7EB; }
      .filter-btn.active[data-cat="vscode"]   { background: #1e1b44; border-color: #7F77DD; color: #AFA9EC; }
      .filter-btn.active[data-cat="gestion"]  { background: #1a2d0a; border-color: #639922; color: #97C459; }
      .filter-btn.active[data-cat="ia"]       { background: #2d1f05; border-color: #BA7517; color: #EF9F27; }
      .filter-btn.active[data-cat="runtime"]  { background: #043320; border-color: #1D9E75; color: #5DCAA5; }
      .filter-btn.active[data-cat="servidor"] { background: #2d1008; border-color: #D85A30; color: #F0997B; }
      .filter-btn.active[data-cat="app"]      { background: #2d0e1e; border-color: #D4537E; color: #ED93B1; }
      .filter-btn.active[data-cat="bbdd"]     { background: #222220; border-color: #888780; color: #B4B2A9; }
      .filter-btn.active[data-cat="infra"]    { background: #2d0c0c; border-color: #E24B4A; color: #F09595; }
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      background: var(--bg2);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    #search:focus { border-color: var(--text2); }
    #search::placeholder { color: var(--text3); }

    /* Section label */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text3);
      margin: 2rem 0 .75rem 28px;
    }
    .section-label:first-child { margin-top: 0; }

    /* Timeline lane */
    .lane {
      position: relative;
      padding-left: 28px;
    }
    .lane::before {
      content: '';
      position: absolute;
      left: 9px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--border);
    }

    /* Item */
    .item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 9px 0;
      cursor: pointer;
      transition: opacity .1s;
    }
    .item:hover { opacity: .85; }

    .dot-col {
      position: relative;
      width: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 5px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-entorno  { background: #378ADD; }
    .dot-vscode   { background: #7F77DD; }
    .dot-gestion  { background: #639922; }
    .dot-ia       { background: #BA7517; }
    .dot-runtime  { background: #1D9E75; }
    .dot-servidor { background: #D85A30; }
    .dot-app      { background: #D4537E; }
    .dot-bbdd     { background: #888780; }
    .dot-infra    { background: #E24B4A; }

    .item-body { flex: 1; min-width: 0; }

    .item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .item-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: .03em;

    .badge-entorno  { background: #E6F1FB; color: #185FA5; }
    .badge-vscode   { background: #EEEDFE; color: #534AB7; }
    .badge-gestion  { background: #EAF3DE; color: #3B6D11; }
    .badge-ia       { background: #FAEEDA; color: #854F0B; }
    .badge-runtime  { background: #E1F5EE; color: #0F6E56; }
    .badge-servidor { background: #FAECE7; color: #993C1D; }
    .badge-app      { background: #FBEAF0; color: #993556; }
    .badge-bbdd     { background: #F1EFE8; color: #5F5E5A; }
    .badge-infra    { background: #FCEBEB; color: #A32D2D; }

      .badge-entorno  { background: #0c3150; color: #85B7EB; }
      .badge-vscode   { background: #1e1b44; color: #AFA9EC; }
      .badge-gestion  { background: #1a2d0a; color: #97C459; }
      .badge-ia       { background: #2d1f05; color: #EF9F27; }
      .badge-runtime  { background: #043320; color: #5DCAA5; }
      .badge-servidor { background: #2d1008; color: #F0997B; }
      .badge-app      { background: #2d0e1e; color: #ED93B1; }
      .badge-bbdd     { background: #222220; color: #B4B2A9; }
      .badge-infra    { background: #2d0c0c; color: #F09595; }
    }

    .item-desc {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
      line-height: 1.4;
    }

    .item-detail {
      display: none;
      font-size: 12px;
      color: var(--text2);
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-top: 8px;
      line-height: 1.6;
    }
    .item.open .item-detail { display: block; }

    .chevron {
      font-size: 14px;
      color: var(--text3);
      margin-left: auto;
      padding-top: 3px;
      flex-shrink: 0;
      transition: transform .2s;
      user-select: none;
    }
    .item.open .chevron { transform: rotate(90deg); }

    .no-results {
      font-size: 14px;
      color: var(--text3);
      padding: 2rem 0;
      text-align: center;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 0.5px solid var(--border);
      font-size: 12px;
      color: var(--text3);
      text-align: center;
    }
  </style>
</head>

function render() {
  const container = document.getElementById('timeline');
  container.innerHTML = '';
  let lastSection = null;
  let visible = 0;
  const q = searchQ.toLowerCase();

  data.forEach((d, i) => {
    const catMatch = activeCat === 'all' || activeCat === d.cat;
    const searchMatch = !q ||
      d.name.toLowerCase().includes(q) ||
      d.desc.toLowerCase().includes(q) ||
      (d.detail && d.detail.toLowerCase().includes(q)) ||
      d.cat.toLowerCase().includes(q);

    if (!catMatch || !searchMatch) return;
    visible++;

    if (d.section && d.section !== lastSection) {
      const sl = document.createElement('div');
      sl.className = 'section-label';
      sl.textContent = d.section;
      container.appendChild(sl);
      lastSection = d.section;
    }

    const item = document.createElement('div');
    item.className = 'item';

    item.innerHTML = `
      <div class="dot-col"><div class="dot dot-${d.cat}"></div></div>
      <div class="item-body">
        <div class="item-header">
          <span class="item-name">${highlight(d.name, q)}</span>
          <span class="badge badge-${d.cat}">${labelFor(d.cat)}</span>
        </div>
        <p class="item-desc">${highlight(d.desc, q)}</p>
        <div class="item-detail">${d.detail}</div>
      </div>
      <span class="chevron">›</span>
    `;

    item.addEventListener('click', () => {
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.item.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) item.classList.add('open');
    });

    container.appendChild(item);
  });

  if (visible === 0) {
    container.innerHTML = '<p class="no-results">No se encontraron tecnologías para esta búsqueda.</p>';
  }

  document.getElementById('count-visible').textContent = visible;
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark style="background:rgba(186,117,23,.25);border-radius:2px;padding:0 1px">$1</mark>');
}

function labelFor(cat) {
  const map = {
    entorno:'Entorno local', vscode:'VSCode', gestion:'Gestión',
    ia:'IA', runtime:'Runtime', servidor:'Servidor dev',
    app:'Aplicación', bbdd:'Base de datos', infra:'Infraestructura'
  };
  return map[cat] || cat;
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});

render();
</script>
</body>
</html>
